<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Зевс">
<meta name="theme-color" content="#050508">
<title>Зевс</title>
<link rel="manifest" href="/app/manifest.json">
<link rel="apple-touch-icon" href="/app/icons/apple-touch-icon.png">
<style>
/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050508;--bg2:#0b0b12;
  --gl:rgba(255,255,255,.04);--gl2:rgba(255,255,255,.08);
  --bd:rgba(255,255,255,.08);
  --c:#00f0ff;--p:#9b5de5;--pk:#f0abfc;--g:#00e896;--r:#ff4560;
  --tx:#fff;--tx2:rgba(255,255,255,.45);--tx3:rgba(255,255,255,.2);
}
html,body{height:100%;height:100dvh}
body{background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}

/* ── AMBIENT ORBS ── */
.orbs{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.11}
.orb1{width:380px;height:380px;background:var(--p);top:-120px;left:-80px;animation:o1 15s ease-in-out infinite}
.orb2{width:320px;height:320px;background:var(--c);bottom:-90px;right:-90px;animation:o2 19s ease-in-out infinite}
.orb3{width:180px;height:180px;background:var(--pk);top:48%;left:52%;animation:o3 22s ease-in-out infinite}
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(55px,40px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(-45px,-55px)}}
@keyframes o3{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(calc(-50% + 35px),calc(-50% + 20px))}}

/* ── HEADER ── */
.hdr{
  position:relative;z-index:10;flex-shrink:0;
  padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;
  background:rgba(5,5,8,.88);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-size:18px;font-weight:700;letter-spacing:1px;
  background:linear-gradient(110deg,var(--c),var(--p),var(--pk));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.online{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
.pd{width:6px;height:6px;border-radius:50%;background:var(--g);
  box-shadow:0 0 8px var(--g);animation:pdp 2s ease-in-out infinite}
@keyframes pdp{0%,100%{opacity:1}50%{opacity:.35}}

/* ── MAIN / SECTIONS ── */
.main{flex:1;overflow:hidden;position:relative}
.sec{display:none;height:100%;flex-direction:column;position:relative}
.sec.on{display:flex}

/* ── CHAT ── */
.msgs{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  position:relative;z-index:1;-webkit-overflow-scrolling:touch;
}
.welcome-wrap{display:flex;justify-content:center;padding:4px 0 6px}
.welcome{
  background:rgba(155,93,229,.12);border:1px solid rgba(155,93,229,.3);
  border-radius:18px;padding:16px 18px;max-width:300px;width:100%;
  text-align:center;font-size:15px;line-height:1.6;color:var(--tx);
}
.welcome strong{color:var(--c)}
.msg{
  max-width:82%;padding:11px 15px;border-radius:20px;
  font-size:15px;line-height:1.5;word-break:break-word;white-space:pre-wrap;
}
.msg.u{
  background:linear-gradient(140deg,var(--p),#7b2fe0);color:#fff;
  align-self:flex-end;border-bottom-right-radius:5px;
  box-shadow:0 4px 22px rgba(155,93,229,.35);
}
.msg.b{
  background:var(--gl2);border:1px solid var(--bd);
  align-self:flex-start;border-bottom-left-radius:5px;
}
.msg.typing{background:var(--gl2);border:1px solid var(--bd);
  align-self:flex-start;border-bottom-left-radius:5px}
.dots{display:flex;gap:4px;align-items:center;height:22px}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--tx2);animation:bop 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── INPUT ── */
.inp-area{
  position:relative;z-index:1;flex-shrink:0;
  padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom));
  background:rgba(5,5,8,.92);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid var(--bd);display:flex;align-items:flex-end;gap:8px;
}
.inp-wrap{
  flex:1;background:var(--gl2);border-radius:24px;
  display:flex;align-items:flex-end;padding:9px 14px;
  border:1px solid var(--bd);transition:border-color .2s,box-shadow .2s;
}
.inp-wrap:focus-within{border-color:rgba(155,93,229,.5);box-shadow:0 0 22px rgba(155,93,229,.12)}
.inp-wrap textarea{
  flex:1;background:transparent;border:none;outline:none;color:var(--tx);
  font-size:15px;font-family:inherit;resize:none;max-height:120px;line-height:1.4;
}
.inp-wrap textarea::placeholder{color:var(--tx3)}

/* ── BUTTONS ── */
.bic{
  width:42px;height:42px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s;
}
.bic:active{transform:scale(.88)}
.bic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}
.bsend{background:linear-gradient(140deg,var(--p),#7b2fe0);color:#fff;stroke-width:2;
  box-shadow:0 0 18px rgba(155,93,229,.4)}
.bmic{background:var(--gl2);border:1px solid var(--bd);color:var(--tx);stroke-width:1.8}
.bmic:active,.bmic:hover{border-color:rgba(0,240,255,.4);box-shadow:0 0 18px rgba(0,240,255,.15)}

/* ── VOICE OVERLAY ── */
.vo{
  position:fixed;inset:0;z-index:100;
  background:rgba(3,3,8,.97);
  opacity:0;pointer-events:none;transition:opacity .35s;
}
.vo.on{opacity:1;pointer-events:all}
#voC{position:absolute;inset:0;width:100%;height:100%}

.vo-close{
  position:absolute;top:calc(env(safe-area-inset-top,0px)+12px);right:16px;z-index:10;
  width:38px;height:38px;border-radius:50%;
  background:var(--gl2);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);
}
.vo-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-width:2}

/* Expanding rings — absolutely centered on screen */
.vo-r1,.vo-r2,.vo-r3{
  position:absolute;border-radius:50%;pointer-events:none;
  border:1px solid rgba(0,240,255,.12);
  top:50%;left:50%;
}
.vo-r1{width:155px;height:155px;margin:-77.5px 0 0 -77.5px;animation:rr 2.6s ease-out infinite}
.vo-r2{width:210px;height:210px;margin:-105px 0 0 -105px;animation:rr 2.6s ease-out infinite .85s}
.vo-r3{width:268px;height:268px;margin:-134px 0 0 -134px;animation:rr 2.6s ease-out infinite 1.7s}
@keyframes rr{0%{opacity:.5;transform:scale(.75)}100%{opacity:0;transform:scale(1.35)}}

/* Orb — exactly at screen center via top/left + negative margin (no transform conflict) */
.vo-orb{
  position:absolute;
  top:50%;left:50%;
  width:106px;height:106px;
  margin-top:-53px;margin-left:-53px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:4;
  border:1.5px solid rgba(155,93,229,.5);
  background:radial-gradient(circle at 38% 38%,rgba(155,93,229,.22),rgba(0,240,255,.07));
  box-shadow:0 0 50px rgba(155,93,229,.22),inset 0 0 30px rgba(0,240,255,.04);
  animation:orb-idle 3.8s ease-in-out infinite;
  transition:border-color .3s,box-shadow .3s,background .3s;
}
.vo-orb svg{width:34px;height:34px;stroke:var(--tx);fill:none;stroke-width:1.6;stroke-linecap:round;transition:stroke .3s}
.vo-orb.listen{
  border-color:rgba(0,240,255,.8);
  background:radial-gradient(circle at 38% 38%,rgba(0,240,255,.18),rgba(155,93,229,.08));
  box-shadow:0 0 70px rgba(0,240,255,.45),inset 0 0 40px rgba(0,240,255,.07);
  animation:orb-listen .9s ease-in-out infinite;
}
.vo-orb.listen svg{stroke:var(--c)}
.vo-orb.think{
  border-color:rgba(240,171,252,.65);
  box-shadow:0 0 58px rgba(240,171,252,.35);
  animation:orb-spin 2s linear infinite;
}
.vo-orb.think svg{stroke:var(--pk)}
.vo-orb.speak{
  border-color:rgba(0,232,150,.65);
  background:radial-gradient(circle at 38% 38%,rgba(0,232,150,.14),rgba(0,240,255,.07));
  box-shadow:0 0 65px rgba(0,232,150,.32);
  animation:orb-speak .7s ease-in-out infinite;
}
.vo-orb.speak svg{stroke:var(--g)}
@keyframes orb-idle{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes orb-listen{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
@keyframes orb-spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes orb-speak{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.85}}

/* Text — absolutely below the orb center */
.vo-txt{
  position:absolute;top:calc(50% + 72px);left:50%;
  transform:translateX(-50%);
  width:280px;text-align:center;font-size:16px;line-height:1.55;
  color:var(--tx);min-height:44px;z-index:4;
  text-shadow:0 0 24px rgba(155,93,229,.3);
}
.vo-st{
  position:absolute;top:calc(50% + 128px);left:50%;
  transform:translateX(-50%);
  white-space:nowrap;
  font-size:11px;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--tx2);z-index:4;transition:color .3s;
}
.vo-st.listen{color:var(--c);text-shadow:0 0 12px rgba(0,240,255,.5)}
.vo-st.think{color:var(--pk);text-shadow:0 0 12px rgba(240,171,252,.5)}
.vo-st.speak{color:var(--g);text-shadow:0 0 12px rgba(0,232,150,.5)}

/* ── SECTION HEADER ── */
.sh{
  padding:16px 14px 10px;font-size:22px;font-weight:700;flex-shrink:0;
  letter-spacing:-.3px;
  background:linear-gradient(130deg,var(--tx) 60%,var(--tx2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── LIST ── */
.list{flex:1;overflow-y:auto;padding:6px 14px;-webkit-overflow-scrolling:touch}
.li{
  background:var(--gl);border:1px solid var(--bd);border-radius:16px;
  padding:13px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;transition:all .15s;
}
.li:active{border-color:rgba(155,93,229,.4);background:rgba(155,93,229,.06)}
.li-tx{flex:1;font-size:15px;line-height:1.3}
.li-sm{font-size:12px;color:var(--tx2);margin-top:3px}
.li.done .li-tx{text-decoration:line-through;color:var(--tx3)}
.chk{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.2);background:transparent;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.chk svg{width:12px;height:12px;stroke:#000;fill:none;stroke-width:2.5;stroke-linecap:round;opacity:0}
.chk.on{background:var(--g);border-color:var(--g);box-shadow:0 0 12px rgba(0,232,150,.4)}
.chk.on svg{opacity:1}
.ibtn{
  background:none;border:none;cursor:pointer;padding:5px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:var(--tx3);
  transition:color .15s;
}
.ibtn:active{color:var(--r)}
.ibtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-width:1.8}
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:14px;color:var(--tx2);padding:40px;text-align:center;
}
.empty svg{width:52px;height:52px;stroke:currentColor;fill:none;stroke-width:1.2;stroke-linecap:round;opacity:.2}
.empty p{font-size:15px}

/* ── QUICK ADD ── */
.qadd{
  flex-shrink:0;padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom));
  background:rgba(5,5,8,.92);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid var(--bd);display:flex;gap:8px;
}
.qadd input{
  flex:1;background:var(--gl2);border:1px solid var(--bd);border-radius:24px;
  padding:10px 16px;color:var(--tx);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;
}
.qadd input::placeholder{color:var(--tx3)}
.qadd input:focus{border-color:rgba(155,93,229,.45)}
.badd{
  background:linear-gradient(140deg,var(--p),#7b2fe0);color:#fff;border:none;
  border-radius:50%;width:42px;height:42px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(155,93,229,.35);transition:transform .15s;
}
.badd:active{transform:scale(.9)}
.badd svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-linecap:round;stroke-width:2.2}

/* ── SPORT STATS ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 10px;flex-shrink:0}
.stat{background:var(--gl);border-radius:18px;padding:16px;border:1px solid var(--bd)}
.stat.c{border-color:rgba(0,240,255,.2);box-shadow:0 0 26px rgba(0,240,255,.04)}
.stat.p{border-color:rgba(155,93,229,.2);box-shadow:0 0 26px rgba(155,93,229,.04)}
.stat-v{font-size:34px;font-weight:700;line-height:1;letter-spacing:-1px}
.stat-v.c{color:var(--c);text-shadow:0 0 18px rgba(0,240,255,.55)}
.stat-v.p{color:var(--p);text-shadow:0 0 18px rgba(155,93,229,.55)}
.stat-l{font-size:11px;color:var(--tx2);margin-top:5px;text-transform:uppercase;letter-spacing:.5px}

/* ── PROJECTS ── */
.pgrid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:10px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;
  flex:1;align-content:start;
}
.pc{
  background:var(--gl);border:1px solid var(--bd);border-radius:20px;
  padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:6px;
  min-height:126px;transition:all .2s;position:relative;overflow:hidden;
}
.pc::before{content:'';position:absolute;inset:0;border-radius:20px;
  background:var(--pcl,transparent);opacity:.08;pointer-events:none}
.pc:active{transform:scale(.96)}
.pc-ico{font-size:28px;margin-bottom:2px}
.pc-name{font-size:15px;font-weight:600;line-height:1.2}
.pc-meta{font-size:12px;color:var(--tx2);margin-top:auto}
.pc-bar{height:3px;border-radius:2px;background:var(--pcl,var(--p));opacity:.65;margin-top:6px;width:40%}
.pc-new{
  border:2px dashed rgba(255,255,255,.1);background:transparent;min-height:126px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;border-radius:20px;color:var(--tx2);font-size:13px;transition:all .2s;
}
.pc-new svg{width:30px;height:30px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-width:1.5;opacity:.3}
.pc-new:active{border-color:rgba(155,93,229,.5);color:var(--p)}

/* Project Detail */
.pd{
  position:absolute;inset:0;z-index:5;background:var(--bg);
  display:flex;flex-direction:column;
  transform:translateX(102%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);
}
.pd.on{transform:translateX(0)}
.pd-hdr{
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:calc(env(safe-area-inset-top,0px)+10px) 14px 12px;
  background:rgba(5,5,8,.92);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid var(--bd);
}
.pd-back{
  width:36px;height:36px;border-radius:50%;background:var(--gl2);
  border:1px solid var(--bd);display:flex;align-items:center;
  justify-content:center;cursor:pointer;color:var(--tx);
}
.pd-back svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-width:2}
.pd-title{font-size:17px;font-weight:600;flex:1;display:flex;align-items:center;gap:8px}
.pd-del{background:none;border:none;color:var(--tx3);cursor:pointer;padding:5px;
  display:flex;align-items:center;transition:color .15s}
.pd-del:active{color:var(--r)}
.pd-del svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-width:1.8}

/* ── MODAL ── */
.modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(3,3,8,.88);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal.on{opacity:1;pointer-events:all}
.msh{
  width:100%;max-width:480px;background:#0b0b14;border:1px solid var(--bd);
  border-radius:28px 28px 0 0;padding:22px 18px;
  padding-bottom:max(28px,env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);
}
.modal.on .msh{transform:translateY(0)}
.m-title{font-size:17px;font-weight:600;margin-bottom:16px;color:var(--tx)}
.msh input{
  width:100%;background:var(--gl2);border:1px solid var(--bd);border-radius:14px;
  padding:12px 15px;color:var(--tx);font-size:16px;font-family:inherit;outline:none;margin-bottom:16px;
}
.msh input:focus{border-color:rgba(155,93,229,.5)}
.er{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.ep{
  width:44px;height:44px;border-radius:12px;background:var(--gl2);
  border:2px solid transparent;display:flex;align-items:center;
  justify-content:center;font-size:22px;cursor:pointer;transition:all .15s;
}
.ep.on{border-color:var(--p);background:rgba(155,93,229,.15);box-shadow:0 0 14px rgba(155,93,229,.3)}
.cr{display:flex;gap:10px;margin-bottom:20px}
.cp{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.cp.on{border-color:#fff;transform:scale(1.15)}
.mbtns{display:flex;gap:10px}
.mbt{
  flex:1;padding:12px;border-radius:14px;border:none;cursor:pointer;
  font-size:15px;font-weight:600;font-family:inherit;transition:all .15s;
}
.mbt:active{transform:scale(.96)}
.mbt.cx{background:var(--gl2);color:var(--tx)}
.mbt.ok{background:linear-gradient(140deg,var(--p),#7b2fe0);color:#fff;box-shadow:0 0 18px rgba(155,93,229,.35)}

/* ── NAV ── */
.nav{
  flex-shrink:0;display:flex;
  background:rgba(5,5,8,.94);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid var(--bd);padding-bottom:env(safe-area-inset-bottom);
  position:relative;z-index:10;
}
.ni{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:9px 4px;cursor:pointer;border:none;background:transparent;
  color:var(--tx2);font-size:10px;font-family:inherit;transition:color .2s;letter-spacing:.2px;
}
.ni.on{color:var(--p)}
.ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.7;transition:filter .2s}
.ni.on svg{filter:drop-shadow(0 0 7px var(--p))}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:88px;left:50%;z-index:500;
  background:#0e0e1c;border:1px solid rgba(155,93,229,.4);
  padding:10px 20px;border-radius:24px;font-size:14px;color:var(--tx);
  opacity:0;pointer-events:none;transition:all .25s;
  transform:translateX(-50%) translateY(8px);white-space:nowrap;
  box-shadow:0 0 26px rgba(155,93,229,.2);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">ZEUS AI</div>
  <div class="online"><div class="pd"></div><span>онлайн</span></div>
</header>

<main class="main">

  <!-- CHAT -->
  <div class="sec on" id="s-chat">
    <div class="orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
    <div class="msgs" id="msgs">

<script>
// ══ CONFIG ══════════════════════════════════
const API = 'https://mycheagent.ru/webhook/pwa-chat';
const sid = localStorage.getItem('sid') || (() => {
  const id = 'u' + Math.random().toString(36).slice(2,9);
  localStorage.setItem('sid', id); return id;
})();

// Safe JSON parse — if localStorage is corrupted, don't crash the app
function ls(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
  catch(e) { localStorage.removeItem(key); return def; }
}

// ══ STATE ════════════════════════════════════
let curSec    = 'chat';
let tasks     = ls('tasks',    []);
let notes     = ls('notes',    []);
let sport     = ls('sport',    []);
let projects  = ls('projects', []);
let chatHist  = ls('chatHist', []);
let curProjId = null;

function save() {
  localStorage.setItem('tasks',    JSON.stringify(tasks));
  localStorage.setItem('notes',    JSON.stringify(notes));
  localStorage.setItem('sport',    JSON.stringify(sport));
  localStorage.setItem('projects', JSON.stringify(projects));
  localStorage.setItem('chatHist', JSON.stringify(chatHist.slice(-60)));
}

// ══ NAVIGATION ═══════════════════════════════
function sw(name, btn) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(b => b.classList.remove('on'));
  document.getElementById('s-'+name).classList.add('on');
  btn.classList.add('on');
  curSec = name;
  if (name==='tasks')    renderT();
  if (name==='notes')    renderN();
  if (name==='sport')    renderS();
  if (name==='projects') renderP();
}

// ══ CHAT ═════════════════════════════════════
function rsz(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function onK(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendTxt();}}

// Last N messages as history for GPT context
function getHistory(n=12) {
  return chatHist.slice(-n).map(m => ({
    role: m.role === 'u' ? 'user' : 'assistant',
    content: m.text
  }));
}

async function sendTxt(msg) {
  const el = document.getElementById('ti');
  const text = msg || el.value.trim();
  if (!text) return;
  if (!msg) { el.value=''; el.style.height='auto'; }
  addMsg(text, 'u', true);
  const t = addTyping();
  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({section:curSec, message:text, sessionId:sid, history:getHistory()})
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    t.remove();
    addMsg(d.reply || '…', 'b', true);
  } catch(e) {
    t.remove();
    addMsg('Ошибка: ' + e.message, 'b', false);
  }
}

function addMsg(text, role, save_=false) {
  const d = document.createElement('div');
  d.className = 'msg '+role;
  d.textContent = text;
  const c = document.getElementById('msgs');
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  if (save_) {
    chatHist.push({role, text, ts: Date.now()});
    save();
  }
  return d;
}

function addTyping() {
  const d = document.createElement('div');
  d.className='msg typing';
  d.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  const c=document.getElementById('msgs');
  c.appendChild(d); c.scrollTop=c.scrollHeight;
  return d;
}

// Restore chat history
function loadChat() {
  const c = document.getElementById('msgs');
  chatHist.forEach(m => {
    const d = document.createElement('div');
    d.className = 'msg '+m.role;
    d.textContent = m.text;
    c.appendChild(d);
  });
  c.scrollTop = c.scrollHeight;
}

// ══ NEURAL CANVAS ════════════════════════════
class Neural {
  constructor(cv) {
    this.cv = cv; this.cx = cv.getContext('2d');
    this.nodes = []; this.rings = [];
    this.audioLevel = 0; this.analyser = null; this.aData = null;
    this.mode = 'idle'; this.f = 0; this.raf = null;
    this.w = this.h = 0;
    this._init();
  }
  _init() {
    this._resize();
    for (let i=0;i<18;i++) this.nodes.push({
      x:Math.random()*this.w, y:Math.random()*this.h,
      vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
      r:Math.random()*1.6+.7, ph:Math.random()*Math.PI*2
    });
    window.addEventListener('resize', ()=>this._resize());
  }
  _resize() { this.w=this.cv.width=window.innerWidth; this.h=this.cv.height=window.innerHeight; }
  setAnalyser(a) { this.analyser=a; this.aData=new Uint8Array(a.frequencyBinCount); }
  setMode(m) { this.mode=m; }
  draw() {
    const {cx:c,w,h,nodes,rings,f,mode}=this;
    if (this.analyser && this.aData) {
      this.analyser.getByteFrequencyData(this.aData);
      this.audioLevel = this.aData.reduce((s,v)=>s+v,0)/(this.aData.length*255);
    }
    const al=this.audioLevel, m=mode;
    c.clearRect(0,0,w,h);
    const nc = m==='listen'?`rgba(0,240,255,`:m==='think'?`rgba(240,171,252,`:m==='speak'?`rgba(0,232,150,`:`rgba(155,93,229,`;
    const spd = m==='listen'?1+al*3.5:m==='think'?2:1;
    nodes.forEach(n=>{
      n.x+=n.vx*spd; n.y+=n.vy*spd;
      if(n.x<0||n.x>w)n.vx*=-1; if(n.y<0||n.y>h)n.vy*=-1;
      n.x=Math.max(0,Math.min(w,n.x)); n.y=Math.max(0,Math.min(h,n.y));
    });
    // connections
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<150){const a=(1-d/150)*(m==='idle'?.15:.28);c.beginPath();c.strokeStyle=nc+a+')';c.lineWidth=.7;c.moveTo(nodes[i].x,nodes[i].y);c.lineTo(nodes[j].x,nodes[j].y);c.stroke();}
    }
    // nodes
    nodes.forEach(n=>{
      const p=m!=='idle'?1+Math.sin(f*.09+n.ph)*.25*al:1;
      c.beginPath();c.arc(n.x,n.y,n.r*p,0,Math.PI*2);c.fillStyle=nc+(m==='idle'?.35:.6)+')';c.fill();
    });
    const cx=w/2,cy=h/2;
    // audio rings
    if(m==='listen'&&al>.035&&f%5===0) rings.push({r:62,a:.75});
    for(let i=rings.length-1;i>=0;i--){const rg=rings[i];rg.r+=2.2;rg.a-=.016;if(rg.a<=0){rings.splice(i,1);continue;}c.beginPath();c.arc(cx,cy,rg.r,0,Math.PI*2);c.strokeStyle=`rgba(0,240,255,${rg.a})`;c.lineWidth=1;c.stroke();}
    // frequency arc
    if(this.aData&&(m==='listen'||m==='speak')){
      const R=62,bars=60,step=Math.PI*2/bars;
      for(let i=0;i<bars;i++){
        const idx=Math.floor(i/bars*this.aData.length), v=(this.aData[idx]||0)/255;
        const ang=step*i-Math.PI/2, len=6+v*34;
        c.beginPath();c.strokeStyle=m==='speak'?`rgba(0,232,150,${.3+v*.7})`:`rgba(0,240,255,${.3+v*.7})`;c.lineWidth=1.8;c.lineCap='round';
        c.moveTo(cx+Math.cos(ang)*R,cy+Math.sin(ang)*R);c.lineTo(cx+Math.cos(ang)*(R+len),cy+Math.sin(ang)*(R+len));c.stroke();
      }
    }
    // think dots
    if(m==='think'){const t=f*.05;for(let i=0;i<3;i++){const a=t+i*Math.PI*2/3;c.beginPath();c.arc(cx+Math.cos(a)*68,cy+Math.sin(a)*68,4,0,Math.PI*2);c.fillStyle=`rgba(240,171,252,${.4+Math.sin(t+i)*.35})`;c.fill();}}
    this.f++;
    this.raf=requestAnimationFrame(()=>this.draw());
  }
  start(){if(!this.raf)this.draw();}
  stop(){cancelAnimationFrame(this.raf);this.raf=null;}
}

let neural=null;

// ══ VOICE ════════════════════════════════════
let voActive=false, voProc=false;
let recog=null, aCtx=null, aNode=null, mStream=null;
let ttsAudioNode=null;
let pendingTxt='';
let cachedVoices=[];
let ttsUnlocked=false;
let wakeLock=null;

// Screen Wake Lock — prevent screen off during voice dialogue
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock=null; }
}
// Re-acquire if page visibility restored (iOS releases it on tab switch)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState==='visible' && voActive) requestWakeLock();
});

// Pre-load TTS voices (needed on iOS/Chrome — async load)
function initVoices() {
  if (!window.speechSynthesis) return;
  cachedVoices = speechSynthesis.getVoices();
  if (!cachedVoices.length) {
    speechSynthesis.addEventListener('voiceschanged', () => {
      cachedVoices = speechSynthesis.getVoices();
    }, {once:true});
  }
}

// iOS requires TTS to be triggered within a user gesture.
// We call a zero-length utterance immediately on first tap.
function unlockTTS() {
  if (ttsUnlocked || !window.speechSynthesis) return;
  ttsUnlocked = true;
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0;
  speechSynthesis.speak(u);
}

function openVoice() {
  document.getElementById('vo').classList.add('on');
  if (!neural) { neural=new Neural(document.getElementById('voC')); }
  neural.start();
  neural.setMode('idle');
  voSetSt('idle','Нажми чтобы говорить');
  voSetTxt('');
  setOrbState('idle');
  requestWakeLock();
}

function closeVoice() {
  stopAll();
  releaseWakeLock();
  document.getElementById('vo').classList.remove('on');
  if (neural) { neural.setMode('idle'); neural.audioLevel=0; }
}

function toggleVoice() {
  if (!voActive) startVoice();
  else { stopAll(); voSetSt('idle','Нажми чтобы говорить'); voSetTxt(''); setOrbState('idle'); }
}

async function startVoice() {
  unlockTTS(); // must be called synchronously inside user gesture (tap)
  voActive=true; voProc=false;
  voSetSt('listen','Слушаю...');
  setOrbState('listen');

  // Mic for visualization
  try {
    mStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    aCtx = new (window.AudioContext||window.webkitAudioContext)();
    aNode = aCtx.createAnalyser();
    aNode.fftSize = 128;
    aCtx.createMediaStreamSource(mStream).connect(aNode);
    if (neural) neural.setAnalyser(aNode);
  } catch(e) { /* mic viz not available */ }

  startRecog();
}

function startRecog() {
  if (!voActive || voProc) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { voSetSt('idle','SpeechRecognition не поддерживается'); return; }

  if (recog) { try{recog.abort();}catch(e){} recog=null; }

  recog = new SR();
  recog.lang='ru-RU';
  recog.continuous=false;
  recog.interimResults=true;
  recog.maxAlternatives=1;

  recog.onresult = e => {
    const all = Array.from(e.results);
    const txt = all.map(r=>r[0].transcript).join('');
    voSetTxt(txt);
    const fin = all.filter(r=>r.isFinal).map(r=>r[0].transcript).join('').trim();
    if (fin) pendingTxt = fin;
  };

  recog.onend = () => {
    if (!voActive) return;
    if (pendingTxt) {
      const t = pendingTxt; pendingTxt = '';
      processVoice(t);
    } else if (!voProc) {
      setTimeout(() => { if (voActive && !voProc) startRecog(); }, 350);
    }
  };

  recog.onerror = e => {
    if (e.error === 'not-allowed') { toast('Нет доступа к микрофону'); closeVoice(); return; }
    if (e.error === 'aborted') return; // мы сами прервали
    if (voActive && !voProc) setTimeout(() => startRecog(), 600);
  };

  try { recog.start(); } catch(e) {}
}

// Kept for backward compat
function restartRecog() { startRecog(); }

async function processVoice(text) {
  voProc = true;
  addMsg(text, 'u', true);
  voSetTxt(text); voSetSt('think','Думаю...'); setOrbState('think');
  if (neural) neural.setMode('think');

  try {
    const r = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({section:curSec, message:text, sessionId:sid, history:getHistory()})
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const reply = d.reply || '…';
    addMsg(reply, 'b', true);
    voSetTxt(reply);
    voSetSt('speak', 'Зевс отвечает...');
    setOrbState('speak');
    if (neural) neural.setMode('speak');
    // OpenAI TTS (onyx) если пришло аудио, иначе браузерный fallback
    if (d.audio_b64) {
      await playAudio(d.audio_b64, reply);
    } else {
      await voSpeak(reply);
    }
  } catch(e) {
    const msg = (e.message || '').toLowerCase();
    const userMsg = msg.includes('http') ? 'Нет связи' : 'Попробуй ещё раз';
    voSetTxt(userMsg);
    await sleep(1500);
  }

  voProc = false;
  if (voActive) {
    voSetTxt('');
    voSetSt('listen','Слушаю...');
    setOrbState('listen');
    if (neural) neural.setMode('listen');
    // Short pause so mic doesn't catch TTS echo
    setTimeout(() => startRecog(), 500);
  }
}

// Play OpenAI TTS audio (base64 mp3) via AudioContext — iOS-safe
async function playAudio(b64, fallbackText='') {
  if (!b64) { await voSpeak(fallbackText); return; }
  try {
    // Strip any whitespace/newlines that break atob() on iOS Safari
    const clean = b64.replace(/[^A-Za-z0-9+\/=]/g, '');
    if (!clean) throw new Error('empty');

    const bStr = atob(clean);
    const bytes = new Uint8Array(bStr.length);
    for (let i=0; i<bStr.length; i++) bytes[i] = bStr.charCodeAt(i);

    // Reuse AudioContext created on user-gesture tap (unlocked on iOS)
    let ctx = aCtx;
    if (!ctx || ctx.state === 'closed') {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      aCtx = ctx;
    }
    await ctx.resume();

    // Use callback form — more reliable on iOS Safari than Promise form
    const decoded = await new Promise((resolve, reject) => {
      ctx.decodeAudioData(bytes.buffer.slice(0), resolve, reject);
    });
    const source = ctx.createBufferSource();
    source.buffer = decoded;

    // Analyser so neural animation reacts to Zeus's voice
    const ttsAnalyser = ctx.createAnalyser();
    ttsAnalyser.fftSize = 128;
    source.connect(ttsAnalyser);
    source.connect(ctx.destination);
    if (neural) neural.setAnalyser(ttsAnalyser);
    ttsAudioNode = source;

    // Await playback (inner Promise is NOT async — safe pattern)
    await new Promise(res => {
      const tmo = setTimeout(() => { try{source.stop();}catch(e){} res(); }, 90000);
      source.onended = () => {
        clearTimeout(tmo); ttsAudioNode = null;
        if (aNode && neural) neural.setAnalyser(aNode);
        res();
      };
      source.start(0);
    });

  } catch(e) {
    ttsAudioNode = null;
    if (aNode && neural) neural.setAnalyser(aNode);
    // Graceful fallback: browser TTS
    try { await voSpeak(fallbackText); } catch(e2) {}
  }
}

function voSpeak(text) {
  return new Promise(res => {
    if (!window.speechSynthesis) { res(); return; }
    speechSynthesis.cancel();

    setTimeout(() => {
      if (!voActive) { res(); return; }

      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ru-RU';
      u.rate = 0.97;
      u.pitch = 0.85;  // deeper / masculine
      u.volume = 1.0;

      // Prefer male Russian voice (iOS: "Yuri", Android: varies)
      const voices = cachedVoices.length ? cachedVoices : speechSynthesis.getVoices();
      const rv = voices.find(v => /yuri|юрий/i.test(v.name))
              || voices.find(v => v.lang === 'ru-RU' && /male|m$/i.test(v.name))
              || voices.find(v => v.lang === 'ru-RU')
              || voices.find(v => v.lang.startsWith('ru'))
              || voices.find(v => v.default)
              || voices[0];
      if (rv) u.voice = rv;

      // Timeout fallback — if onend never fires (iOS bug)
      const dur = Math.min(Math.max(text.length * 75, 3500), 35000);
      const tmo = setTimeout(() => { speechSynthesis.cancel(); res(); }, dur);

      // iOS Safari: resume if paused (background/focus loss)
      const resumeIOS = setInterval(() => {
        if (!speechSynthesis.speaking) { clearInterval(resumeIOS); return; }
        if (speechSynthesis.paused) speechSynthesis.resume();
      }, 5000);

      const done = () => { clearTimeout(tmo); clearInterval(resumeIOS); res(); };
      u.onend  = done;
      u.onerror = done;

      speechSynthesis.speak(u);
    }, 120); // small delay after cancel()
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function stopAll() {
  voActive=false; voProc=false; pendingTxt='';
  if (recog) { try{recog.abort();}catch(e){} recog=null; }
  if (ttsAudioNode) { try{ttsAudioNode.stop();}catch(e){} ttsAudioNode=null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  if (mStream) { mStream.getTracks().forEach(t=>t.stop()); mStream=null; }
  if (aCtx) { try{aCtx.close();}catch(e){} aCtx=null; aNode=null; }
  if (neural) { neural.analyser=null; neural.aData=null; neural.audioLevel=0; }
}

function setOrbState(s) {
  const o=document.getElementById('voOrb');
  o.classList.remove('listen','think','speak');
  if (s!=='idle') o.classList.add(s);
}
function voSetSt(mode,txt){const el=document.getElementById('voSt');el.textContent=txt;el.className='vo-st '+mode;}
function voSetTxt(t){document.getElementById('voTxt').textContent=t;}

// ══ TASKS ════════════════════════════════════
function addTask(){const e=document.getElementById('tii'),v=e.value.trim();if(!v)return;tasks.unshift({id:Date.now(),text:v,done:false,d:td()});save();renderT();e.value='';}
function togT(id){const t=tasks.find(x=>x.id===id);if(t)t.done=!t.done;save();renderT();}
function delT(id){tasks=tasks.filter(x=>x.id!==id);save();renderT();}
function renderT(){
  const el=document.getElementById('tlist');
  if(!tasks.length){el.innerHTML=emptyH(svgTask(),'Нет задач');return;}
  el.innerHTML=tasks.map(t=>`<div class="li${t.done?' done':''}">
    <div class="chk${t.done?' on':''}" onclick="togT(${t.id})">${chkSvg()}</div>
    <div style="flex:1"><div class="li-tx">${esc(t.text)}</div><div class="li-sm">${t.d}</div></div>
    <button class="ibtn" onclick="delT(${t.id})">${xSvg()}</button>
  </div>`).join('');
}

// ══ PROJECTS ════════════════════════════════
const EMOJIS=['💼','🚀','🎯','💡','🎨','📊','🔬','📱','🏋️','🌟','🔧','⚡','🎬','🏆'];
const COLORS=['#9b5de5','#00f0ff','#00e896','#ff4560','#ffd93d','#f0abfc','#ff8c42','#4fc3f7'];
let pEmoji=EMOJIS[0], pColor=COLORS[0];

function renderP(){
  let h='';
  projects.forEach(p=>{
    const done=p.tasks.filter(t=>t.done).length, tot=p.tasks.length;
    h+=`<div class="pc" style="--pcl:${p.color}" onclick="openProj('${p.id}')">
      <div class="pc-ico">${p.emoji}</div>
      <div class="pc-name">${esc(p.name)}</div>
      <div class="pc-meta">${tot} задач · ${done} готово</div>
      <div class="pc-bar"></div>
    </div>`;
  });
  h+=`<div class="pc-new" onclick="openPM()">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span>Новый проект</span>
  </div>`;
  document.getElementById('pgrid').innerHTML=h;
}

function openProj(id){
  curProjId=id;
  const p=projects.find(x=>x.id===id); if(!p)return;
  document.getElementById('pdTitle').innerHTML=`${p.emoji} ${esc(p.name)}`;
  renderPT();
  document.getElementById('pdv').classList.add('on');
}
function closeProj(){document.getElementById('pdv').classList.remove('on');curProjId=null;}
function delCurProj(){
  if(!curProjId)return;
  projects=projects.filter(p=>p.id!==curProjId);
  save();closeProj();renderP();
}
function addProjTask(){
  const el=document.getElementById('pti'),v=el.value.trim();
  if(!v||!curProjId)return;
  const p=projects.find(x=>x.id===curProjId);if(!p)return;
  p.tasks.unshift({id:Date.now(),text:v,done:false,d:td()});
  save();renderPT();el.value='';
}
function togPT(id){const p=projects.find(x=>x.id===curProjId);if(!p)return;const t=p.tasks.find(x=>x.id===id);if(t)t.done=!t.done;save();renderPT();}
function delPT(id){const p=projects.find(x=>x.id===curProjId);if(!p)return;p.tasks=p.tasks.filter(x=>x.id!==id);save();renderPT();}
function renderPT(){
  const p=projects.find(x=>x.id===curProjId);
  const el=document.getElementById('pdlist');
  if(!p||!p.tasks.length){el.innerHTML=emptyH(svgTask(),'Нет задач в проекте');return;}
  el.innerHTML=p.tasks.map(t=>`<div class="li${t.done?' done':''}">
    <div class="chk${t.done?' on':''}" onclick="togPT(${t.id})">${chkSvg()}</div>
    <div style="flex:1"><div class="li-tx">${esc(t.text)}</div><div class="li-sm">${t.d}</div></div>
    <button class="ibtn" onclick="delPT(${t.id})">${xSvg()}</button>
  </div>`).join('');
}

// Modal
function openPM(){
  pEmoji=EMOJIS[0];pColor=COLORS[0];
  document.getElementById('pni').value='';
  document.getElementById('er').innerHTML=EMOJIS.map(e=>`<div class="ep${e===pEmoji?' on':''}" onclick="pickE('${e}')">${e}</div>`).join('');
  document.getElementById('cr').innerHTML=COLORS.map(c=>`<div class="cp${c===pColor?' on':''}" style="background:${c}" onclick="pickC('${c}')"></div>`).join('');
  document.getElementById('pm').classList.add('on');
  setTimeout(()=>document.getElementById('pni').focus(),350);
}
function closePM(){document.getElementById('pm').classList.remove('on');}
function pickE(e){pEmoji=e;document.getElementById('er').innerHTML=EMOJIS.map(v=>`<div class="ep${v===pEmoji?' on':''}" onclick="pickE('${v}')">${v}</div>`).join('');}
function pickC(c){pColor=c;document.getElementById('cr').innerHTML=COLORS.map(v=>`<div class="cp${v===pColor?' on':''}" style="background:${v}" onclick="pickC('${v}')"></div>`).join('');}
function confirmProj(){
  const name=document.getElementById('pni').value.trim();
  if(!name){toast('Введи название');return;}
  projects.push({id:'p'+Date.now(),name,emoji:pEmoji,color:pColor,created:td(),tasks:[]});
  save();renderP();closePM();
}

// ══ NOTES ════════════════════════════════════
function addNote(){const e=document.getElementById('nii'),v=e.value.trim();if(!v)return;notes.unshift({id:Date.now(),text:v,d:td()});save();renderN();e.value='';}
function delN(id){notes=notes.filter(x=>x.id!==id);save();renderN();}
function renderN(){
  const el=document.getElementById('nlist');
  if(!notes.length){el.innerHTML=emptyH(`<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,'Нет заметок');return;}
  el.innerHTML=notes.map(n=>`<div class="li">
    <div style="flex:1"><div class="li-tx">${esc(n.text)}</div><div class="li-sm">${n.d}</div></div>
    <button class="ibtn" onclick="delN(${n.id})">${xSvg()}</button>
  </div>`).join('');
}

// ══ SPORT ════════════════════════════════════
function addSport(){
  const e=document.getElementById('sii'),v=e.value.trim();if(!v)return;
  const isCal=/\d+\s*(кал|калор|kcal|cal)/i.test(v);
  const cal=isCal?parseInt(v.match(/\d+/)[0]):0;
  sport.unshift({id:Date.now(),text:v,type:isCal?'cal':'wk',cal,d:td(),ts:Date.now()});
  save();renderS();e.value='';
}
function delSp(id){sport=sport.filter(x=>x.id!==id);save();renderS();}
function renderS(){
  const t=td(),wk=Date.now()-7*86400000;
  const cals=sport.filter(e=>e.d===t&&e.type==='cal').reduce((s,e)=>s+e.cal,0);
  const wks=sport.filter(e=>e.type==='wk'&&e.ts>wk).length;
  document.getElementById('calV').textContent=cals;
  document.getElementById('wkV').textContent=wks;
  const el=document.getElementById('slist');
  if(!sport.length){el.innerHTML=emptyH(`<svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,'Нет записей');return;}
  el.innerHTML=sport.map(e=>`<div class="li">
    <div style="flex:1"><div class="li-tx">${esc(e.text)}</div><div class="li-sm">${e.d}</div></div>
    <button class="ibtn" onclick="delSp(${e.id})">${xSvg()}</button>
  </div>`).join('');
}

// ══ UTILS ════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function td(){return new Date().toLocaleDateString('ru');}
function emptyH(ico,txt){return`<div class="empty">${ico}<p>${txt}</p></div>`;}
function svgTask(){return`<svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`;}
function chkSvg(){return`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;}
function xSvg(){return`<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;}

let ttm;
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('on');clearTimeout(ttm);ttm=setTimeout(()=>e.classList.remove('on'),2600);}

// ══ INIT ═════════════════════════════════════
document.getElementById('pm').addEventListener('click',function(e){if(e.target===this)closePM();});
loadChat();
renderT(); renderN(); renderS(); renderP();
initVoices();
if('serviceWorker' in navigator) navigator.serviceWorker.register('/app/sw.js').catch(()=>{});
</script>
