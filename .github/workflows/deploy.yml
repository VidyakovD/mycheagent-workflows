name: Deploy to server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.215.238.107
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            if ! grep -q "ANTHROPIC_API_KEY" /root/n8n/docker-compose.yml; then
              sed -i '/OPENAI_API_KEY/a\      - ANTHROPIC_API_KEY=sk-aw-ddf23d5ecc729f9ce4032cd6cbdabd28\n      - ANTHROPIC_BASE_URL=https:\/\/api.awstore.cloud' /root/n8n/docker-compose.yml
            fi
            bash /root/deploy.sh
